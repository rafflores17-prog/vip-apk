<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Acesso VIP Direto</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
    color: #fff;
    text-align: center;
}

.container {
    max-width: 400px;
    margin: 50px auto;
    padding: 25px;
    background: #1c1c1c;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(0,0,0,0.7);
}

h1 {
    color: #00ffcc;
}

.sub {
    color: #ccc;
    font-size: 14px;
}

.price {
    font-size: 32px;
    margin: 15px 0;
    color: #00ffcc;
    font-weight: bold;
}

.pix-box {
    background: #111;
    padding: 12px;
    border-radius: 10px;
    margin: 10px 0;
    word-break: break-all;
    font-size: 13px;
}

button {
    background: #00ffcc;
    border: none;
    padding: 14px;
    width: 100%;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
}

button:hover {
    background: #00ccaa;
}

a {
    text-decoration: none;
}

.badge {
    background: #00ffcc;
    color: #000;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    display: inline-block;
    margin-bottom: 10px;
}

.info {
    font-size: 12px;
    color: #aaa;
    margin-top: 10px;
}

.warning {
    font-size: 11px;
    color: #777;
    margin-top: 10px;
}

#qrcode {
    margin: 15px auto;
}
</style>
</head>

<body>

<div class="container">

    <div class="badge">ACESSO IMEDIATO</div>

    <h1>🔐 Grupo VIP</h1>

    <p class="sub">
        Links diretos, sem encurtador, atualizações frequentes 🔥
    </p>

    <div class="price">R$10</div>

    <p>Pagamento via Pix:</p>

    <!-- QR CODE -->
    <div id="qrcode"></div>

    <!-- CHAVE PIX -->
    <div class="pix-box" id="pix">
        84999585659
    </div>

    <button onclick="copiarPix(event)">📋 Copiar chave Pix</button>

    <a href="https://wa.me/5584999585659?text=Olá,%20já%20paguei%20o%20VIP.%20segue%20o%20comprovante">
        <button>📲 Enviar comprovante</button>
    </a>

    <p class="info">
        Liberação rápida após envio do comprovante.
    </p>

    <p class="warning">
        Acesso individual. Compartilhamento pode resultar em remoção.
    </p>

</div>

<script>
// GERAR QR CODE COM PIX
var chavePix = "84999585659";

new QRCode(document.getElementById("qrcode"), {
    text: chavePix,
    width: 150,
    height: 150
});

// COPIAR PIX
function copiarPix(event) {
    navigator.clipboard.writeText(chavePix);

    let botao = event.target;
    botao.innerText = "✅ Copiado!";

    setTimeout(() => {
        botao.innerText = "📋 Copiar chave Pix";
    }, 2000);
}
</script>

</body>
</html>
